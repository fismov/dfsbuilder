name: Build DFS for Linux

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'core/app/service/dfs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'
    
    - name: Install webp dependencies
      run: sudo apt-get update && sudo apt-get install -y libwebp-dev
    
    - name: Build DFS
      run: |
        ls -la
        find . -name "main.go" -path "*/dfs/*"
        cd core/app/service/dfs/cmd/dfs || cd app/service/dfs/cmd/dfs || exit 1
        go build -o ../../../../dfs-linux-amd64
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dfs-linux-amd64
        path: core/dfs-linux-amd64
