name: Build DFS for Linux

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'core/app/service/dfs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Clone teamgram-server
      run: |
        git clone https://github.com/teamgram/teamgram-server.git

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Install webp dependencies
      run: sudo apt-get update && sudo apt-get install -y libwebp-dev

    - name: Build DFS
      run: |
        # собираем бинарник прямо в рабочую директорию раннера
        cd teamgram-server
        ls -la
        find . -name "main.go" -path "*/dfs/*"
        cd app/service/dfs/cmd/dfs
        go build -o "$GITHUB_WORKSPACE/dfs-linux-amd64"
        ls -la "$GITHUB_WORKSPACE/dfs-linux-amd64" || echo "FILE NOT FOUND"
        find "$GITHUB_WORKSPACE" -name "dfs-linux-amd64"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dfs-linux-amd64
        path: dfs-linux-amd64
